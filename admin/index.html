<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Vab-loggen · Admin</title>
  <style>
    :root {
      --bg: #f4efe3;
      --surface: #fffdf7;
      --surface-alt: #faf6ec;
      --text: #1b1b17;
      --muted: #7a7568;
      --border: #e5ddc9;
      --primary: #3d5c4d;
      --primary-soft: #e4ece7;
      --sage: #88a895;
      --accent: #c97b2c;
      --accent-soft: #f3e2cf;
      --danger: #b3261e;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }
    h1 { font-weight: 500; font-size: 30px; letter-spacing: -0.01em; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 20px 22px; }

    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; }
    .refresh { background: var(--accent); color: #fff; border: none;
      padding: 10px 20px; border-radius: 999px; cursor: pointer; font-size: 13px;
      font-weight: 600; letter-spacing: 0.02em; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    .refresh:hover { background: #b36c24; }

    .grid-stats { display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 12px; margin-bottom: 24px; }
    @media (max-width: 960px) { .grid-stats { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 560px) { .grid-stats { grid-template-columns: repeat(2, 1fr); } }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 16px 18px; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.1em; font-weight: 700; }
    .stat-value { font-size: 30px; font-weight: 500; margin-top: 6px; color: var(--primary);
      letter-spacing: -0.02em; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .grid-charts { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 860px) { .grid-charts { grid-template-columns: 1fr; } }

    .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }

    .chart { display: flex; gap: 10px; align-items: flex-end; height: 140px;
      padding: 0 4px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
      height: 100%; justify-content: flex-end; }
    .bar-count { font-size: 12px; color: var(--primary); font-weight: 600; }
    .bar { width: 100%; background: var(--sage); border-radius: 6px 6px 0 0;
      min-height: 3px; transition: height 300ms; }
    .bar-label { font-size: 10px; color: var(--muted); font-weight: 500; }

    .donut-wrap { display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 140px; position: relative; }
    .donut-center { position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); text-align: center; }
    .donut-pct { font-size: 24px; font-weight: 500; color: var(--primary);
      letter-spacing: -0.02em; }
    .donut-caption { font-size: 10px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.08em; margin-top: 2px; }
    .donut-legend { display: flex; gap: 16px; justify-content: center; margin-top: 12px;
      font-size: 11px; color: var(--muted); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 12px 14px; }
    th { background: var(--primary-soft); color: var(--primary); font-weight: 700;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    tbody tr:nth-child(odd) { background: var(--surface); }
    tbody tr:nth-child(even) { background: var(--surface-alt); }
    tbody tr:hover { background: rgba(61,92,77,0.05); }
    td { border-top: 1px solid var(--border); }

    .muted { color: var(--muted); }
    .small { font-size: 11px; color: var(--muted); }
    .tag { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px;
      font-weight: 600; }
    .tag-ok { background: var(--primary-soft); color: var(--primary); }
    .tag-mute { background: #ecebe4; color: var(--muted); }
    .tag-accent { background: var(--accent-soft); color: var(--accent); }

    .grid-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
    @media (max-width: 860px) { .grid-bottom { grid-template-columns: 1fr; } }
    .list { display: flex; flex-direction: column; gap: 10px; }
    .list-item { display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; background: var(--surface-alt); border-radius: 12px;
      border: 1px solid var(--border); }
    .list-item strong { color: var(--primary); font-weight: 600; font-size: 13px; }
    .list-item .meta { font-size: 11px; color: var(--muted); }

    .login { max-width: 360px; margin: 80px auto; }
    .login input { width: 100%; padding: 12px 14px; border: 1px solid var(--border);
      border-radius: 12px; font-size: 15px; background: var(--surface); margin-bottom: 10px; }
    .login button { width: 100%; padding: 12px; border: none; border-radius: 12px;
      background: var(--primary); color: white; font-size: 15px; font-weight: 600;
      cursor: pointer; }
    .login button:hover { background: #2b4437; }
    .error { color: var(--danger); font-size: 13px; margin-top: 8px; }
    .code { font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px; letter-spacing: 0.04em; color: var(--primary); }
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>

  <script>
    const SUPABASE_PROJECT = 'uscvqcxvccixzlkhjbdo';
    const FN_URL = `https://${SUPABASE_PROJECT}.functions.supabase.co/admin-stats`;
    const TOKEN_KEY = 'vabb_admin_token';

    function h(tag, attrs = {}, ...children) {
      const el = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') el.className = v;
        else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
        else el.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null || c === false) continue;
        el.append(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
      }
      return el;
    }
    function svg(tag, attrs = {}, ...children) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      for (const c of children.flat()) if (c != null && c !== false) el.append(c);
      return el;
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString('sv-SE', { dateStyle: 'short', timeStyle: 'short' });
    }
    function fmtDay(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('sv-SE', { day: '2-digit', month: 'short' });
    }
    function fmtRelative(iso) {
      if (!iso) return '—';
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'nyss';
      if (diff < 3600) return Math.floor(diff / 60) + ' min sedan';
      if (diff < 86400) return Math.floor(diff / 3600) + ' h sedan';
      return Math.floor(diff / 86400) + ' d sedan';
    }

    async function fetchStats(token) {
      const r = await fetch(FN_URL, { headers: { 'x-admin-token': token } });
      if (r.status === 401) throw new Error('Fel lösenord.');
      if (!r.ok) throw new Error('Kunde inte hämta data (' + r.status + ')');
      return r.json();
    }

    function renderLogin(container, err) {
      container.innerHTML = '';
      const form = h('div', { class: 'login' },
        h('h1', {}, 'Vab-loggen · Admin'),
        h('div', { class: 'sub', style: 'margin-bottom: 20px' }, 'Ange admin-lösenord för att fortsätta.'),
        h('input', { id: 'pw', type: 'password', placeholder: 'ADMIN_SECRET', autofocus: '' }),
        h('button', { onclick: handleSubmit }, 'Logga in'),
        err ? h('div', { class: 'error' }, err) : null,
      );
      container.append(form);
      const input = form.querySelector('#pw');
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSubmit(); });

      async function handleSubmit() {
        const token = input.value.trim();
        if (!token) return;
        try {
          await fetchStats(token);
          sessionStorage.setItem(TOKEN_KEY, token);
          boot();
        } catch (e) { renderLogin(container, e.message); }
      }
    }

    function donut(active, total) {
      const size = 120, stroke = 16, r = (size - stroke) / 2;
      const c = 2 * Math.PI * r;
      const pct = total > 0 ? active / total : 0;
      const dash = c * pct;
      return h('div', { class: 'donut-wrap' },
        svg('svg', { width: size, height: size, viewBox: `0 0 ${size} ${size}` },
          svg('circle', {
            cx: size/2, cy: size/2, r, fill: 'none',
            stroke: '#ecebe4', 'stroke-width': stroke,
          }),
          svg('circle', {
            cx: size/2, cy: size/2, r, fill: 'none',
            stroke: '#3d5c4d', 'stroke-width': stroke,
            'stroke-dasharray': `${dash} ${c - dash}`,
            'stroke-dashoffset': c / 4,
            'stroke-linecap': 'round',
            transform: `rotate(-90 ${size/2} ${size/2})`,
          }),
        ),
        h('div', { class: 'donut-center' },
          h('div', { class: 'donut-pct' }, Math.round(pct * 100) + '%'),
          h('div', { class: 'donut-caption' }, 'aktiva'),
        ),
      );
    }

    function renderDashboard(container, data) {
      container.innerHTML = '';
      const t = data.totals;
      const maxSignup = Math.max(1, ...data.signups_last_7_days.map(x => x.count));
      const activePct = t.users > 0 ? (t.active_users_30d || 0) / t.users : 0;

      container.append(
        h('div', { class: 'row' },
          h('div', {},
            h('h1', {}, 'Vab-loggen · Admin'),
            h('div', { class: 'sub' }, 'Uppdaterad ' + fmtDate(new Date().toISOString())),
          ),
          h('button', { class: 'refresh', onclick: boot }, 'Uppdatera'),
        ),

        h('div', { class: 'grid-stats' },
          stat('Användare', t.users),
          stat('Hushåll', t.households, `${t.multi_member_households} delade`),
          stat('Barn', t.children),
          stat('Registreringar', t.entries, `${t.entries_last_30d} senaste 30 d`),
          stat('Inskickade', t.entries_submitted),
          stat('Push', t.push_subscriptions),
        ),

        h('div', { class: 'grid-charts' },
          h('div', { class: 'card' },
            h('h2', { class: 'section-title' }, 'Nya användare senaste 7 dagarna'),
            h('div', { class: 'chart' },
              data.signups_last_7_days.map(d =>
                h('div', { class: 'bar-col' },
                  h('div', { class: 'bar-count' }, String(d.count)),
                  h('div', { class: 'bar', style: `height: ${(d.count / maxSignup) * 100}px` }),
                  h('div', { class: 'bar-label' }, d.date.slice(5)),
                ),
              ),
            ),
          ),
          h('div', { class: 'card' },
            h('h2', { class: 'section-title' }, 'Aktivitet senaste 30 dagar'),
            donut(t.active_users_30d || 0, t.users),
            h('div', { class: 'donut-legend' },
              h('span', {}, h('span', { class: 'dot', style: 'background:#3d5c4d' }), `Aktiva ${t.active_users_30d || 0}`),
              h('span', {}, h('span', { class: 'dot', style: 'background:#ecebe4' }), `Inaktiva ${Math.max(0, t.users - (t.active_users_30d || 0))}`),
            ),
          ),
        ),

        h('div', { class: 'card', style: 'padding: 0; overflow: auto;' },
          h('div', { style: 'padding: 18px 22px 12px;' },
            h('h2', { class: 'section-title', style: 'margin: 0' }, `Användare (${data.users.length})`),
          ),
          h('table', {},
            h('thead', {},
              h('tr', {},
                ['E-post', 'Provider', 'Registrerad', 'Senast inloggad', 'Hushåll', 'Barn', 'Entries', 'Push']
                  .map(x => h('th', {}, x)),
              ),
            ),
            h('tbody', {},
              data.users.map(u =>
                h('tr', {},
                  h('td', {}, u.email || h('span', { class: 'muted' }, '—')),
                  h('td', {}, h('span', { class: 'tag tag-mute' }, u.provider || '—')),
                  h('td', {}, h('span', { title: fmtDate(u.created_at) }, fmtRelative(u.created_at))),
                  h('td', {}, h('span', { title: fmtDate(u.last_sign_in_at) }, fmtRelative(u.last_sign_in_at))),
                  h('td', {}, u.household_id
                    ? h('span', { title: u.household_id }, u.household_name || h('span', { class: 'code' }, u.household_id.slice(0, 8) + '…'))
                    : h('span', { class: 'muted' }, '—')),
                  h('td', {}, String(u.children_count)),
                  h('td', {}, String(u.entries_count)),
                  h('td', {}, u.push_count > 0
                    ? h('span', { class: 'tag tag-ok' }, String(u.push_count))
                    : h('span', { class: 'muted' }, '0')),
                ),
              ),
            ),
          ),
        ),

        h('div', { class: 'grid-bottom' },
          h('div', { class: 'card' },
            h('h2', { class: 'section-title' }, 'Senaste registreringar'),
            h('div', { class: 'list' },
              (data.recent_entries || []).length === 0
                ? h('div', { class: 'muted small' }, 'Inga registreringar ännu.')
                : data.recent_entries.map(e =>
                    h('div', { class: 'list-item' },
                      h('div', {},
                        h('strong', {}, e.child_name || 'Barn'),
                        h('div', { class: 'meta' }, fmtDay(e.date) + (e.reason ? ' · ' + e.reason : '')),
                      ),
                      h('span', { class: 'tag tag-accent' }, e.extent ? Math.round(e.extent * 100) + '%' : '—'),
                    ),
                  ),
            ),
          ),
          h('div', { class: 'card' },
            h('h2', { class: 'section-title' }, 'Hushåll med flera medlemmar'),
            h('div', { class: 'list' },
              (data.multi_member_list || []).length === 0
                ? h('div', { class: 'muted small' }, 'Inga delade hushåll ännu.')
                : data.multi_member_list.map(hh =>
                    h('div', { class: 'list-item' },
                      h('div', {},
                        h('strong', { class: 'code' }, hh.invite_code || '—'),
                        h('div', { class: 'meta' }, (hh.member_names || []).join(', ') || '—'),
                      ),
                      h('span', { class: 'tag tag-ok' }, hh.member_count + ' medlemmar'),
                    ),
                  ),
            ),
          ),
        ),
      );

      function stat(label, value, sub) {
        return h('div', { class: 'stat' },
          h('div', { class: 'stat-label' }, label),
          h('div', { class: 'stat-value' }, String(value ?? 0)),
          sub ? h('div', { class: 'stat-sub' }, sub) : null,
        );
      }
    }

    async function boot() {
      const app = document.getElementById('app');
      const token = sessionStorage.getItem(TOKEN_KEY);
      if (!token) { renderLogin(app); return; }
      try {
        app.innerHTML = '<div class="sub">Laddar…</div>';
        const data = await fetchStats(token);
        renderDashboard(app, data);
      } catch (e) {
        sessionStorage.removeItem(TOKEN_KEY);
        renderLogin(app, e.message);
      }
    }

    boot();
  </script>
</body>
</html>
